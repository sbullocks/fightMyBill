<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>FightMyBill — AI Medical Bill Auditor &amp; Negotiation Coach</title>
    <meta name="description" content="Upload your medical bill and let AI find billing errors, duplicate charges, and upcoding. Get a personalized negotiation letter in seconds. Stop overpaying." />
    <meta name="keywords" content="medical bill negotiation, medical billing errors, fight medical bills, hospital bill audit, medical bill help, reduce medical debt" />
    <link rel="canonical" href="https://fight-my-bill.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fight-my-bill.vercel.app/" />
    <meta property="og:title" content="FightMyBill — AI Medical Bill Auditor" />
    <meta property="og:description" content="AI finds billing errors in your medical bill and writes your negotiation letter. Most bills have at least one error. Find yours." />
    <meta property="og:image" content="https://fight-my-bill.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://fight-my-bill.vercel.app/" />
    <meta name="twitter:title" content="FightMyBill — AI Medical Bill Auditor" />
    <meta name="twitter:description" content="AI finds billing errors in your medical bill and writes your negotiation letter. Most bills have at least one error. Find yours." />
    <meta name="twitter:image" content="https://fight-my-bill.vercel.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FightMyBill",
      "description": "AI-powered medical bill auditor that finds billing errors and writes personalized negotiation letters.",
      "url": "https://fight-my-bill.vercel.app",
      "applicationCategory": "HealthApplication",
      "offers": [
        {
          "@type": "Offer",
          "name": "Single bill analysis",
          "price": "5.00",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Bill pack (3 analyses)",
          "price": "12.00",
          "priceCurrency": "USD"
        }
      ]
    }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
